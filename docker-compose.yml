# =============================================================================
# Local development compose — runs one worker cycle against real AWS
# (credentials are mounted from your ~/.aws config).
# =============================================================================
services:
  worker:
    build: .
    image: crawler-worker:local
    environment:
      CRAWLER_SCHEDULE_MODE: "once"
      CRAWLER_AWS_REGION: "${AWS_REGION:-ap-southeast-1}"
      CRAWLER_SQS_QUEUE_URL: "${CRAWLER_SQS_QUEUE_URL:-}"
      CRAWLER_S3_RAW_BUCKET: "${CRAWLER_S3_RAW_BUCKET:-}"
      CRAWLER_MAX_ITEMS_PER_SOURCE: "20"
      CRAWLER_LOG_LEVEL: "INFO"
      AWS_PROFILE: "${AWS_PROFILE:-default}"
    volumes:
      - ~/.aws:/app/.aws:ro
