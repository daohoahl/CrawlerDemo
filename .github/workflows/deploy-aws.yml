name: Build and Deploy Crawler to AWS

on:
  push:
    branches: ["main"]
  workflow_dispatch: {}

env:
  AWS_REGION: ap-southeast-1
  ECR_REPOSITORY: crawler-demo-worker
  ASG_NAME: crawler-demo-worker-asg
  LAMBDA_FUNCTION_NAME: crawler-demo-ingester
  LAMBDA_SOURCE_FILE: infrastructure/aws/lambda_ingester/lambda_function.py

permissions:
  id-token: write
  contents: read

jobs:
  test:
    name: Lint and test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-test.txt

      - name: Pytest
        run: PYTHONPATH=src pytest -q

  terraform-validate:
    name: Terraform fmt + validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8
      - name: fmt
        run: terraform fmt -check -recursive infrastructure/terraform
      - name: validate
        run: |
          terraform -chdir=infrastructure/terraform/environments/demo init -backend=false
          terraform -chdir=infrastructure/terraform/environments/demo validate

  build-and-push:
    name: Build and push worker image
    needs: [test, terraform-validate]
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.build.outputs.image }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/GitHubActionsRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Login ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        id: build
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          IMAGE="$ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:${{ github.sha }}"
          docker build --platform linux/amd64 -t "$IMAGE" .
          docker push "$IMAGE"
          docker tag "$IMAGE" "$ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:latest"
          docker push "$ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:latest"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

  deploy-lambda:
    name: Package and update Lambda
    needs: terraform-validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/GitHubActionsRole
          aws-region: ${{ env.AWS_REGION }}
      - name: Zip and update function code
        run: |
          cd infrastructure/aws/lambda_ingester
          zip -q lambda_function.zip lambda_function.py
          aws lambda update-function-code \
            --function-name "${{ env.LAMBDA_FUNCTION_NAME }}" \
            --zip-file fileb://lambda_function.zip \
            --publish

  deploy-worker:
    name: Rolling refresh worker ASG
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/GitHubActionsRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Rolling refresh ASG (wait for any in-flight refresh, then start)
        run: |
          set -euo pipefail
          ASG="${{ env.ASG_NAME }}"

          wait_idle() {
            # Block until no Instance Refresh is Pending/InProgress (manual deploy or overlapping run).
            for i in $(seq 1 120); do
              R=$(aws autoscaling describe-instance-refreshes \
                --auto-scaling-group-name "$ASG" \
                --max-records 1 \
                --query 'InstanceRefreshes[0].Status' \
                --output text 2>/dev/null || true)
              R=$(echo "$R" | head -n1 | tr -d '\r')
              case "$R" in
                Pending|InProgress)
                  echo "[$i/120] Another instance refresh is active: $R — waiting..."
                  sleep 30
                  ;;
                *)
                  echo "OK to start a new refresh (latest status=$R)"
                  return 0
                  ;;
              esac
            done
            echo "Timeout waiting for existing instance refresh to finish" >&2
            return 1
          }

          wait_idle
          out=$(aws autoscaling start-instance-refresh \
            --auto-scaling-group-name "$ASG" \
            --strategy Rolling \
            --preferences '{"MinHealthyPercentage":50,"InstanceWarmup":120}' 2>&1) && rc=0 || rc=$?
          printf '%s\n' "$out"
          if [ "$rc" -ne 0 ]; then
            if echo "$out" | grep -q InstanceRefreshInProgress; then
              echo "InstanceRefreshInProgress — waiting, then retrying once..."
              wait_idle
              aws autoscaling start-instance-refresh \
                --auto-scaling-group-name "$ASG" \
                --strategy Rolling \
                --preferences '{"MinHealthyPercentage":50,"InstanceWarmup":120}'
            else
              exit "$rc"
            fi
          fi

          for i in $(seq 1 45); do
            STATUS=$(aws autoscaling describe-instance-refreshes \
              --auto-scaling-group-name "$ASG" \
              --max-records 1 \
              --query 'InstanceRefreshes[0].Status' \
              --output text | head -n1 | tr -d '\r')
            echo "[$i/45] refresh status=$STATUS"
            case "$STATUS" in
              Successful) exit 0 ;;
              Failed|Cancelled) exit 1 ;;
            esac
            sleep 30
          done
          echo "Timeout waiting for instance refresh" >&2
          exit 1
