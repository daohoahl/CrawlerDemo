[defaults]
# ASG: inventory/crawler_worker.aws_ec2.yml — SSH qua SSM (connection.yml), không dùng plugin aws_ssm.
inventory                   = inventory/crawler_worker.aws_ec2.yml
roles_path                  = roles
host_key_checking           = False
retry_files_enabled         = False
interpreter_python          = auto_silent
# Một worker / SSH qua SSM — giữ 1 fork cho ổn định.
forks                       = 1
timeout                     = 120
stdout_callback             = default
bin_ansible_callbacks       = True
deprecation_warnings        = True

# ansible-core 2.13+: thay cho callback yaml (community.general) đã bỏ
[callback_default]
result_format = yaml

[inventory]
enable_plugins = host_list, script, auto, yaml, ini, toml

[ssh_connection]
pipelining    = True

[privilege_escalation]
become        = True
become_method = sudo
