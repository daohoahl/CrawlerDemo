services:
  crawler:
    image: ${IMAGE:?set IMAGE env var}
    restart: unless-stopped
    environment:
      CRAWLER_DATABASE_URL: "sqlite:///./data/crawler.db"
      CRAWLER_SCHEDULE_MODE: "interval"
      CRAWLER_INTERVAL_SECONDS: "1800"
      CRAWLER_MAX_ITEMS_PER_SOURCE: "100"
      # Override with env if needed:
      # CRAWLER_RSS_URLS: '["https://feeds.reuters.com/Reuters/worldNews","https://feeds.reuters.com/Reuters/PoliticsNews"]'
      # CRAWLER_SITEMAP_URLS: '["https://www.theguardian.com/sitemaps/news.xml"]'
    volumes:
      - ./data:/app/data

  web:
    image: ${IMAGE:?set IMAGE env var}
    restart: unless-stopped
    command: ["uvicorn", "crawlerdemo.web:app", "--host", "0.0.0.0", "--port", "8000"]
    environment:
      CRAWLER_DATABASE_URL: "sqlite:///./data/crawler.db"
    volumes:
      - ./data:/app/data
    ports:
      - "127.0.0.1:8090:8000"

