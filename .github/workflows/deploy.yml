name: Build and deploy crawler to EC2

on:
  push:
    branches: ["main"]

env:
  DOCKERHUB_IMAGE: duyhung81002/crawler_test

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.DOCKERHUB_IMAGE }}:latest
            ${{ env.DOCKERHUB_IMAGE }}:${{ github.sha }}

  deploy-ec2:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_KEY }}

      - name: Deploy to EC2 via SSH
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
        run: |
          IMAGE="${{ env.DOCKERHUB_IMAGE }}:latest"

          ssh -o StrictHostKeyChecking=no "$EC2_USER@$EC2_HOST" bash -s -- \
            "$IMAGE" \
            "${{ secrets.EC2_APP_DIR }}" << 'EOF'
          set -euo pipefail
          IMAGE="$1"
          APP_DIR="$2"

          mkdir -p "$APP_DIR"
          mkdir -p "$APP_DIR/data"
          cd "$APP_DIR"

          cat > docker-compose.ec2.yml << 'YAML'
          services:
            crawler:
              image: ${IMAGE:?set IMAGE env var}
              restart: unless-stopped
              environment:
                CRAWLER_DATABASE_URL: "sqlite:///./data/crawler.db"
                CRAWLER_SCHEDULE_MODE: "interval"
                CRAWLER_INTERVAL_SECONDS: "1800"
                CRAWLER_MAX_ITEMS_PER_SOURCE: "100"
              volumes:
                - ./data:/app/data

            web:
              image: ${IMAGE:?set IMAGE env var}
              restart: unless-stopped
              command: ["uvicorn", "crawlerdemo.web:app", "--host", "0.0.0.0", "--port", "8000"]
              environment:
                CRAWLER_DATABASE_URL: "sqlite:///./data/crawler.db"
              volumes:
                - ./data:/app/data
              ports:
                - "127.0.0.1:8090:8000"
          YAML

          export IMAGE
          docker pull "$IMAGE"
          docker compose -f docker-compose.ec2.yml up -d
          docker image prune -f
          EOF

