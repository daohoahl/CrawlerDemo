services:
  crawler:
    image: ${IMAGE:?set IMAGE env var}
    restart: unless-stopped
    environment:
      CRAWLER_DATABASE_URL: ${CRAWLER_DATABASE_URL:?set CRAWLER_DATABASE_URL}
      CRAWLER_SCHEDULE_MODE: "interval"
      CRAWLER_INTERVAL_SECONDS: "1800"
      CRAWLER_MAX_ITEMS_PER_SOURCE: "100"
      CRAWLER_S3_BUCKET: ${CRAWLER_S3_BUCKET:-}
      CRAWLER_S3_REGION: "ap-southeast-1"
      CRAWLER_S3_EXPORT_PREFIX: "exports/"
      # Override sources if needed:
      # CRAWLER_RSS_URLS: '[...]'
      # CRAWLER_SITEMAP_URLS: '[...]'

  web:
    image: ${IMAGE:?set IMAGE env var}
    restart: unless-stopped
    command: ["uvicorn", "crawlerdemo.web:app", "--host", "0.0.0.0", "--port", "8000"]
    environment:
      CRAWLER_DATABASE_URL: ${CRAWLER_DATABASE_URL:?set CRAWLER_DATABASE_URL}
      CRAWLER_S3_BUCKET: ${CRAWLER_S3_BUCKET:-}
      CRAWLER_S3_REGION: "ap-southeast-1"
      CRAWLER_S3_EXPORT_PREFIX: "exports/"
    ports:
      - "127.0.0.1:8090:8000"
