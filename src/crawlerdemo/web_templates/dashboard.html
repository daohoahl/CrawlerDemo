<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Crawler Dashboard</title>
    <link rel="stylesheet" href="/static/dashboard.css" />
  </head>
  <body>
    <main class="container">
      <header class="header">
        <h1>Crawler Dashboard</h1>
        <p>Search and browse ingested articles from RDS.</p>
      </header>

      <section class="card controls">
        <div class="row">
          <input id="q" type="text" placeholder="Search title, summary, URL..." />
          <input id="source" type="text" placeholder="Filter source (exact)" />
          <select id="sortBy">
            <option value="fetched_at">Sort: fetched_at</option>
            <option value="published_at">Sort: published_at</option>
          </select>
          <select id="sortOrder">
            <option value="desc">desc</option>
            <option value="asc">asc</option>
          </select>
          <button id="searchBtn">Search</button>
        </div>
      </section>

      <section class="card">
        <div class="meta">
          <span id="summary">Loading...</span>
          <div class="pager">
            <button id="prevBtn">&lt; Prev</button>
            <span id="pageInfo">Page 1</span>
            <button id="nextBtn">Next &gt;</button>
          </div>
        </div>
        <div id="results" class="results"></div>
      </section>
    </main>
    <script src="/static/dashboard.js"></script>
  </body>
</html>
