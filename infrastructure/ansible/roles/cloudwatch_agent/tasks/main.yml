---
- name: Cài Amazon CloudWatch Agent
  ansible.builtin.raw: /usr/bin/dnf install -y amazon-cloudwatch-agent
  register: _dnf_cwa
  changed_when: true
  failed_when: (_dnf_cwa.rc | default(-1)) != 0

- name: Thư mục cấu hình CloudWatch Agent
  ansible.builtin.file:
    path: /opt/aws/amazon-cloudwatch-agent/etc
    state: directory
    mode: "0755"

- name: Ghi cấu hình CloudWatch Agent
  ansible.builtin.template:
    src: amazon-cloudwatch-agent.json.j2
    dest: /opt/aws/amazon-cloudwatch-agent/etc/amazon-cloudwatch-agent.json
    mode: "0644"

- name: Áp dụng cấu hình CloudWatch Agent
  ansible.builtin.shell: |
    /opt/aws/amazon-cloudwatch-agent/bin/amazon-cloudwatch-agent-ctl \
      -a fetch-config -m ec2 \
      -c file:/opt/aws/amazon-cloudwatch-agent/etc/amazon-cloudwatch-agent.json -s
  changed_when: false
